spring.application.name=musiq
spring.datasource.url=jdbc:postgresql://localhost:5432/musiqdb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spotify.client-id=${SPOTIFY_CLIENT_ID}
spotify.client-secret=${SPOTIFY_CLIENT_SECRET}
spotify.redirect-uri=http://127.0.0.1:8080/auth/spotify/callback
spotify.authorization-uri=https://accounts.spotify.com/authorize
spotify.token-uri=https://accounts.spotify.com/api/token
spotify.scopes=user-read-email user-read-private user-top-read user-read-recently-played
spring.profiles.active=local
jwt.expiration=86400000

app.frontend-url=http://localhost:5173