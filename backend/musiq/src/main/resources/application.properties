spring.application.name=musiq

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/musiqdb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Spotify OAuth
spotify.client-id=${SPOTIFY_CLIENT_ID}
spotify.client-secret=${SPOTIFY_CLIENT_SECRET}
spotify.redirect-uri=${SPOTIFY_REDIRECT_URI:http://127.0.0.1:8080/auth/spotify/callback}
spotify.authorization-uri=https://accounts.spotify.com/authorize
spotify.token-uri=https://accounts.spotify.com/api/token
spotify.scopes=user-read-email user-read-private user-top-read user-read-recently-played

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# App
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}
